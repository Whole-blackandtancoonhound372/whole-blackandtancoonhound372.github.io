name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A6F611: ${{ secrets.A6F611 }}
          BB7ED8: ${{ secrets.BB7ED8 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A6F611', '')
          bm = os.environ.get('BB7ED8', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s
              if gm:
                  s2 = s2.replace('<!-- 310a80e06c770533934c0fc409870319d1fe4d7e -->', gm)
              if bm:
                  s2 = s2.replace('<!-- 8f60bc37e50abad35fb6cdc0329defdd43cd7c8eb8ac -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0 and (gm or bm):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
